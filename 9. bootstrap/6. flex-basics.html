<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div class="container py-5">
        <div class="d-flex flex-wrap gap-3 justify-content-center">

            <div class="bg-primary text-white d-flex align-items-center justify-content-center rounded"
                style="width: 300px; height: 200px;">1. Primary</div>

            <div class="bg-secondary text-white d-flex align-items-center justify-content-center rounded"
                style="width: 300px; height: 200px;">2. Secondary</div>

            <div class="bg-success text-white d-flex align-items-center justify-content-center rounded"
                style="width: 300px; height: 200px;">3. Success</div>

            <div class="bg-danger text-white d-flex align-items-center justify-content-center rounded"
                style="width: 300px; height: 200px;">4. Danger</div>

            <div class="bg-warning text-dark d-flex align-items-center justify-content-center rounded"
                style="width: 300px; height: 200px;">5. Warning</div>

            <div class="bg-info text-dark d-flex align-items-center justify-content-center rounded"
                style="width: 300px; height: 200px;">6. Info</div>

            <div class="bg-dark text-white d-flex align-items-center justify-content-center rounded"
                style="width: 300px; height: 200px;">7. Dark</div>

            <div class="bg-primary-subtle text-primary-emphasis d-flex align-items-center justify-content-center rounded border border-primary"
                style="width: 300px; height: 200px;">8. Primary Subtle</div>

            <div class="bg-success-subtle text-success-emphasis d-flex align-items-center justify-content-center rounded border border-success"
                style="width: 300px; height: 200px;">9. Success Subtle</div>

            <div class="bg-danger-subtle text-danger-emphasis d-flex align-items-center justify-content-center rounded border border-danger"
                style="width: 300px; height: 200px;">10. Danger Subtle</div>

        </div>
    </div>
</body>

</html>
