<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <p class="text-start">Left aligned text (default).</p>
    <p class="text-center">Center aligned text.</p>
    <p class="text-end">Right aligned text.</p>
    <hr>
    <p class="text-primary">This is blue text.</p>
    <p class="text-danger text-opacity-50">This is faded red text.</p>
    <p class="text-body-secondary">Standard "muted" secondary body text.</p>
    <hr>
    <div class="row">
        <div class="col-2 text-truncate">
            This is a very long sentence that will be cut off with dots.
        </div>
    </div>
</body>

</html>
