<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .card {
            width: 200px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            text-align: center;
            font-family: sans-serif;
            margin: 50px auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .profile-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .status-indicator {
            width: 20px;
            height: 20px;
            background-color: #28a745;
            border: 3px solid white;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="profile-container">
            <img src="https://www.w3schools.com/howto/img_avatar.png" alt="Profile" class="profile-pic">
            <div class="status-indicator"></div>
        </div>
        <h3>John Doe</h3>

    </div>
</body>

</html>
