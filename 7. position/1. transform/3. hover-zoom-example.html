<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            font-family: sans-serif;
            margin: 20px;
        }

        .img-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            /* This clips the zoomed image */
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .img-container img {
            transform: scale(1.2);
        }

        .content {
            padding: 15px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="img-container">
            <img src="https://m.media-amazon.com/images/I/81mfNrozOtL.jpg" alt="Sample Image">
        </div>
        <div class="content">
            <h3>Card Title</h3>
            <p>This image zooms in when you hover over the card, but stays within the borders.</p>
        </div>
    </div>
</body>

</html>
